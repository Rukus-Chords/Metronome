<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Metronome</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', Arial, sans-serif;
    background: #7bc8e2;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
    padding: 16px;
  }

  .blob {
    position: absolute;
    border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
    background: #5ab5d4;
    z-index: 0;
    pointer-events: none;
  }
  .blob1 { width: 200px; height: 180px; top: -50px; left: -60px; transform: rotate(20deg); }
  .blob2 { width: 180px; height: 160px; bottom: -40px; right: -50px; transform: rotate(-15deg); border-radius: 45% 55% 40% 60% / 55% 45% 60% 40%; }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .bpm-card {
    background: #4a9fc0;
    border-radius: 20px;
    border: 3px solid rgba(255,255,255,0.4);
    padding: 12px 20px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 5px 0 rgba(0,0,0,0.2);
  }

  .bpm-number {
    font-family: 'Nunito', sans-serif;
    font-size: 3.8em;
    font-weight: 800;
    color: white;
    line-height: 1;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }

  .bpm-label {
    font-size: 0.75em;
    font-weight: 800;
    color: rgba(255,255,255,0.7);
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  .bpm-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.25);
    outline: none;
    margin-bottom: 4px;
  }
  .bpm-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    border: 3px solid #4a9fc0;
  }
  .bpm-range-labels {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 0.7em;
    color: rgba(255,255,255,0.6);
    font-weight: 700;
  }

  .sound-label {
    font-size: 0.72em;
    font-weight: 800;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .sound-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }

  .sound-btn {
    background: white;
    border: 3px solid #1a1a1a;
    color: #1a1a1a;
    border-radius: 50px;
    padding: 7px 16px;
    cursor: pointer;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 1.05em;
    box-shadow: 0 4px 0 #1a1a1a;
    transition: all 0.1s;
    position: relative;
    top: 0;
  }
  .sound-btn:active { box-shadow: 0 1px 0 #1a1a1a; top: 3px; }
  .sound-btn.selected {
    background: #1a1a1a;
    color: white;
  }

  .start-stop {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 4px solid #1a1a1a;
    font-family: 'Caveat', cursive;
    font-size: 1.4em;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 5px 0 #1a1a1a;
    transition: all 0.1s;
    position: relative;
    top: 0;
  }
  .start-stop:active { box-shadow: 0 2px 0 #1a1a1a; top: 3px; }
  .start-stop.start { background: white; color: #1a1a1a; }
  .start-stop.stop {
    background: #e74c3c;
    color: white;
    border-color: #c0392b;
    box-shadow: 0 5px 0 #c0392b;
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="content">
  <div class="bpm-card">
    <div class="bpm-number" id="bpmDisplay">120</div>
    <div class="bpm-label">BPM</div>
    <input type="range" class="bpm-slider" id="bpmSlider" min="30" max="250" value="120">
    <div class="bpm-range-labels"><span>30</span><span>250</span></div>
  </div>

  <div class="sound-label">Sound</div>
  <div class="sound-picker">
    <button class="sound-btn selected" data-sound="snap">Snap</button>
    <button class="sound-btn" data-sound="dish">Dish</button>
    <button class="sound-btn" data-sound="castanet">Castanet</button>
    <button class="sound-btn" data-sound="funky">Funky</button>
    <button class="sound-btn" data-sound="cowbell">More Cowbell</button>
  </div>

  <button class="start-stop start" id="startStop">Start</button>
</div>

  beat = 0;
  nextBeatTime = ctx.currentTime + 0.05;
  scheduler();
  isPlaying = true;
}
function stopMetronome() {
  clearTimeout(schedulerTimer);
  isPlaying = false;
}

document.getElementById('startStop').addEventListener('click', async function() {
  if (isPlaying) {
    stopMetronome();
    this.textContent = 'Start';
    this.className = 'start-stop start';
  } else {
    this.textContent = 'Stop';
    this.className = 'start-stop stop';
    await startMetronome();
  }
});

document.getElementById('bpmSlider').addEventListener('input', function() {
  bpm = parseInt(this.value);
  document.getElementById('bpmDisplay').textContent = bpm;
  if (isPlaying) { stopMetronome(); startMetronome(); }
});

document.querySelectorAll('.sound-btn').forEach(btn => {
  btn.addEventListener('click', async function() {
    document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    currentSound = this.dataset.sound;
    if (!audioBuffers[currentSound]) await loadAllSounds(currentSound);
    if (isPlaying) { stopMetronome(); await startMetronome(); }
  });
});

const params = new URLSearchParams(window.location.search);
if (params.get('bpm')) {
  bpm = Math.min(250, Math.max(30, parseInt(params.get('bpm'))));
  document.getElementById('bpmSlider').value = bpm;
  document.getElementById('bpmDisplay').textContent = bpm;
}
if (params.get('sound') && sounds[params.get('sound')]) {
  currentSound = params.get('sound');
  document.querySelectorAll('.sound-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.sound === currentSound);
  });
}

loadAllSounds(currentSound);
</script>
</body>
</html>
